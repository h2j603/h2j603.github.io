name: Build & Deploy to GitHub Pages

# Builds the site (fetching content from Are.na + Google Docs at build time) and
# deploys it to GitHub Pages. GitHub-hosted runners have open internet, so the
# data fetch that the web sandbox can't do works here.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # 수동 트리거 = "지금 다시 빌드"
  schedule:
    # 30분마다 자동 재빌드 — Are.na 변경 사항이 시간 안에 hyuk.xyz로 반영됨
    - cron: '*/30 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # 작품 이미지 증분 캐시 — 없으면 매 배포마다 전 이미지를 Are.na CDN에서
      # 재다운로드한다 (downloadImages의 skip-cache가 디스크 기준이라 복원만
      # 해주면 새 이미지만 받는다). web 작품 스크린샷(screenshot.jpg)도 여기
      # 저장돼 skip-cache된다. run_id 키 = 매번 최신 상태로 다시 저장.
      - name: Cache Are.na images
        uses: actions/cache@v4
        with:
          path: src/assets/works
          key: arena-images-${{ github.run_id }}
          restore-keys: arena-images-
      # Playwright chromium 캐시 — web 작품 스크린샷 캡처용. lockfile 바뀔 때만 재설치.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-
      - name: Install Chromium (web-work screenshots)
        run: npx playwright install --with-deps chromium
      - name: Build (fetch Are.na, then astro build)
        run: npm run build
        env:
          ARENA_TOKEN: ${{ secrets.ARENA_TOKEN }}
          ARENA_INDEX_CHANNEL: ${{ secrets.ARENA_INDEX_CHANNEL }}
          ARENA_INTRO_CHANNEL: ${{ secrets.ARENA_INTRO_CHANNEL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
