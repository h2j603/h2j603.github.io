name: Build & Deploy to GitHub Pages

# Builds the site (fetching content from Are.na + Google Docs at build time) and
# deploys it to GitHub Pages. GitHub-hosted runners have open internet, so the
# data fetch that the web sandbox can't do works here.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # 수동 트리거 = "지금 다시 빌드"
  schedule:
    # 30분마다 자동 재빌드 — Are.na 변경 사항이 시간 안에 hyuk.xyz로 반영됨
    - cron: '*/30 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (fetch Are.na, then astro build)
        run: npm run build
        env:
          ARENA_TOKEN: ${{ secrets.ARENA_TOKEN }}
          ARENA_INDEX_CHANNEL: ${{ secrets.ARENA_INDEX_CHANNEL }}
          ARENA_INTRO_CHANNEL: ${{ secrets.ARENA_INTRO_CHANNEL }}
          ARENA_FOOTER_CHANNEL: ${{ secrets.ARENA_FOOTER_CHANNEL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
