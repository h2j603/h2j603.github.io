<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>desktop preview</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #fff;
    overflow-x: hidden;
    font-family: system-ui, -apple-system, sans-serif;
  }
  #toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 8px;
    background: #fff;
    border-bottom: 1px solid #000;
    font-size: 13px;
  }
  #toolbar button {
    font: inherit;
    background: #fff;
    color: #000;
    border: 1px solid #000;
    padding: 4px 10px;
    cursor: pointer;
  }
  #toolbar button.active {
    background: #000;
    color: #fff;
  }
  #info {
    margin-left: auto;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  #path {
    flex: 1 1 100%;
    box-sizing: border-box;
    min-width: 0;
    font: inherit;
    background: #fff;
    color: #000;
    border: 1px solid #000;
    padding: 4px 8px;
  }
  #stage {
    box-sizing: border-box;
    border: 1px solid #000;
    border-top: 0;
    overflow: hidden;
    margin: 0 auto; /* 스케일된 기기 화면을 가운데 정렬 */
  }
  #frame {
    display: block;
    border: 0;
    transform-origin: top left;
  }
</style>
</head>
<body>
  <div id="toolbar">
    <button data-w="1440">1440</button>
    <button data-w="1024">1024</button>
    <button data-w="768">768</button>
    <button data-w="375">375</button>
    <button id="zoom">100%</button>
    <button id="reload">새로고침</button>
    <span id="info"></span>
    <input id="path" type="text" value="/" spellcheck="false"
           autocomplete="off" autocapitalize="off" aria-label="경로">
  </div>
  <div id="stage">
    <iframe id="frame" title="site preview"></iframe>
  </div>
<script>
  // 폭별 기기 뷰포트 높이 — 세로도 이 값으로 제한(무한정 길어지지 않게).
  var DEVICE_H = { 1440: 900, 1024: 768, 768: 1024, 375: 812 };

  var frame = document.getElementById('frame');
  var stage = document.getElementById('stage');
  var info = document.getElementById('info');
  var toolbar = document.getElementById('toolbar');
  var pathInput = document.getElementById('path');
  var zoomBtn = document.getElementById('zoom');

  // ?w=768&path=/works/foo 로 초기 상태 지정
  var params = new URLSearchParams(location.search);
  var width = parseInt(params.get('w'), 10);
  if (!(width > 0)) width = 1440;
  var initialPath = params.get('path');
  if (!initialPath || initialPath[0] !== '/') initialPath = '/';
  var fitMode = true;

  function markActiveWidth() {
    toolbar.querySelectorAll('button[data-w]').forEach(function (b) {
      b.classList.toggle('active', parseInt(b.dataset.w, 10) === width);
    });
  }

  function framePath() {
    try {
      var l = frame.contentWindow.location;
      return l.pathname + l.search;
    } catch (err) {
      return pathInput.value || '/';
    }
  }

  function syncQuery() {
    var q = new URLSearchParams();
    if (width !== 1440) q.set('w', width);
    var p = framePath();
    if (p !== '/') q.set('path', p);
    var s = q.toString();
    history.replaceState(null, '', location.pathname + (s ? '?' + s : ''));
  }

  function apply() {
    var availW = document.documentElement.clientWidth - 2;
    var availH = window.innerHeight - toolbar.offsetHeight - 1;
    var h = DEVICE_H[width] || 900;
    frame.style.width = width + 'px';
    if (fitMode) {
      // 가로·세로 둘 다 화면 안에 들어오도록(contain) 스케일. 1배 초과 업스케일 금지.
      var scale = Math.min(availW / width, availH / h, 1);
      frame.style.height = h + 'px';
      frame.style.transform = 'scale(' + scale + ')';
      stage.style.width = Math.round(width * scale) + 'px';
      stage.style.height = Math.round(h * scale) + 'px';
      stage.style.overflowX = 'hidden';
      info.textContent = width + '×' + h + ' · ' + Math.round(scale * 100) + '%';
    } else {
      // 100% 모드: 실제 크기, stage 안에서만 가로 스크롤
      frame.style.height = availH + 'px';
      frame.style.transform = 'none';
      stage.style.width = '100%';
      stage.style.height = availH + 'px';
      stage.style.overflowX = 'auto';
      info.textContent = width + '×' + h + ' · 100%';
    }
  }

  toolbar.addEventListener('click', function (e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    if (btn.id === 'reload') {
      try {
        frame.contentWindow.location.reload();
      } catch (err) {
        frame.src = pathInput.value;
      }
      return;
    }
    if (btn.id === 'zoom') {
      fitMode = !fitMode;
      zoomBtn.classList.toggle('active', !fitMode);
      apply();
      return;
    }
    width = parseInt(btn.dataset.w, 10);
    markActiveWidth();
    apply();
    syncQuery();
  });

  pathInput.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    var v = pathInput.value.trim();
    if (v[0] !== '/') v = '/' + v;
    frame.src = v;
    pathInput.blur();
  });

  frame.addEventListener('load', function () {
    if (document.activeElement !== pathInput) pathInput.value = framePath();
    syncQuery();
  });

  window.addEventListener('resize', apply);
  window.addEventListener('orientationchange', apply);

  markActiveWidth();
  pathInput.value = initialPath;
  frame.src = initialPath;
  apply();
</script>
</body>
</html>
